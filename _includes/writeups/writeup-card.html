<div class="wow animated fadeIn" data-wow-delay=".15s">
    <a href="{{ writeup_url }}" class="writeup card text-themed" {%- if external and site.open_new_tab -%} target="_blank" {%- endif -%}>
      {%- if writeup_img -%}
      <img id="{{ writeup_id }}-img" class="card-img-top" src="{{ writeup_img }}" alt="{{ writeup_name }}" />
      {%- endif -%}
      <div class="card-body">
        <h5 id="{{ writeup_id }}-name" class="card-title">
            {%- if writeup_type == "remote" -%}
            <i class="fab fa-github" data-toggle="tooltip" data-placement="bottom" data-delay="250" title="GitHub Repository"></i> |&nbsp;
            {%- endif -%}
          {{ writeup_name }}
        </h5>
        <p id="{{ writeup_id }}-desc" class="card-text">{{ writeup_desc }}</p>
        <p id="{{ writeup_id }}-tools" class="card-text">
          {%- for tool in writeup_tools -%}
          <span class="badge badge-pill text-primary border border-primary ml-1">{{ tool }}</span>
          {%- endfor -%}
        </p>
      </div>
    </a>
  </div>
